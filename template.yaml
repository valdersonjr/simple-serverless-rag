AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Simple serverless RAG — ingestão e busca vetorial com Bedrock + OpenSearch

Globals:
  Function:
    Timeout: 3
    Runtime: python3.12
    Architectures:
      - x86_64
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        OPENSEARCH_ENDPOINT: !Ref OpensearchEndpoint
        OPENSEARCH_INDEX: !Ref OpensearchIndex
        EMBEDDING_DIM: !Ref EmbeddingDim

Parameters:
  OpensearchEndpoint:
    Type: String
    Description: "Endpoint do Amazon OpenSearch Serverless (AOSS)"
  OpensearchIndex:
    Type: String
    Default: rag_chunks
  AossCollectionArn:
    Type: String
    Default: "*"
    Description: "ARN da collection AOSS (ex: arn:aws:aoss:us-east-1:123456789012:collection/simple-rag). Use * apenas para testes."
  BedrockEmbeddingModelId:
    Type: String
    Default: "amazon.titan-embed-text-v2:0"
  ClaudeModelId:
    Type: String
    Default: "anthropic.claude-3-haiku-20240307-v1:0"
    Description: "Model ID do Claude no Bedrock para geração de respostas"
  EmbeddingDim:
    Type: String
    Default: "1024"
    Description: "Dimensão do embedding (Titan V2: 1024/512/256)"

Resources:
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-shared"
      ContentUri: shared/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  IngestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  IngestQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IngestDLQ.Arn
        maxReceiveCount: 3

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      CodeUri: ingest/
      Handler: app.lambda_handler
      Environment:
        Variables:
          INGEST_QUEUE_URL: !Ref IngestQueue
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt IngestQueue.QueueName
        - Statement:
            - Effect: Allow
              Action: aoss:APIAccessAll
              Resource: !Ref AossCollectionArn
      Events:
        IngestPost:
          Type: Api
          Properties:
            Path: /ingest
            Method: post

  IngestWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 120
      MemorySize: 1024
      CodeUri: ingest_worker/
      Handler: app.lambda_handler
      Environment:
        Variables:
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockEmbeddingModelId}"
            - Effect: Allow
              Action: aoss:APIAccessAll
              Resource: !Ref AossCollectionArn
      Events:
        IngestQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt IngestQueue.Arn
            BatchSize: 1

  QueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      MemorySize: 512
      CodeUri: query/
      Handler: app.lambda_handler
      Environment:
        Variables:
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockEmbeddingModelId}"
            - Effect: Allow
              Action: aoss:APIAccessAll
              Resource: !Ref AossCollectionArn
      Events:
        QueryPost:
          Type: Api
          Properties:
            Path: /query
            Method: post

  AskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: ask/
      Handler: app.lambda_handler
      Environment:
        Variables:
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
          CLAUDE_MODEL_ID: !Ref ClaudeModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockEmbeddingModelId}"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${ClaudeModelId}"
            - Effect: Allow
              Action: aoss:APIAccessAll
              Resource: !Ref AossCollectionArn
      Events:
        AskPost:
          Type: Api
          Properties:
            Path: /ask
            Method: post

Outputs:
  ApiBaseUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod"
  IngestApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/ingest"
  QueryApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/query"
  AskApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/ask"
  IngestQueueUrl:
    Value: !Ref IngestQueue
  IngestDLQUrl:
    Value: !Ref IngestDLQ
