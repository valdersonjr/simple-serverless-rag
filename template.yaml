AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  simple-serveless-rag

  Sample SAM Template for simple-serveless-rag

Globals:
  Function:
    Timeout: 3

Parameters:
  OpensearchEndpoint:
    Type: String
    Description: "Endpoint do Amazon OpenSearch Serverless (AOSS), ex: https://xxxx.us-east-1.aoss.amazonaws.com"
  OpensearchIndex:
    Type: String
    Default: rag_chunks
    Description: "Nome do índice no OpenSearch (default: rag_chunks)"
  BedrockEmbeddingModelId:
    Type: String
    Default: "amazon.titan-embed-text-v2:0"
    Description: "Model ID de embeddings no Bedrock"
  BedrockEmbeddingDim:
    Type: String
    Default: "1024"
    Description: "Dimensão do embedding (string para compatibilidade com env vars)"

Resources:
  # ===== Fila (SQS) para ingestão assíncrona =====
  IngestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 dias

  IngestQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IngestDLQ.Arn
        maxReceiveCount: 3

  # ===== API de ingestão: recebe HTTP e enfileira =====
  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      CodeUri: ingest/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Environment:
        Variables:
          INGEST_QUEUE_URL: !Ref IngestQueue
          OPENSEARCH_ENDPOINT: !Ref OpensearchEndpoint
          OPENSEARCH_INDEX: !Ref OpensearchIndex
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
          BEDROCK_EMBEDDING_DIM: !Ref BedrockEmbeddingDim
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt IngestQueue.QueueName
      Events:
        Ingest:
          Type: Api
          Properties:
            Path: /ingest
            Method: post

  # ===== Worker: consome a fila e indexa =====
  IngestWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 120
      MemorySize: 1024
      CodeUri: ingest_worker/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT: !Ref OpensearchEndpoint
          OPENSEARCH_INDEX: !Ref OpensearchIndex
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
          BEDROCK_EMBEDDING_DIM: !Ref BedrockEmbeddingDim
      Policies:
        # Para teste: permissões amplas. Em produção, restrinja.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
            - Effect: Allow
              Action:
                - aoss:APIAccessAll
              Resource: '*'
      Events:
        IngestQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt IngestQueue.Arn
            BatchSize: 1

Outputs:
  ApiBaseUrl:
    Description: "API Gateway base URL (Prod stage)"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod"
  IngestApiUrl:
    Description: "API Gateway endpoint URL for Prod stage for Ingest"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/ingest"
  IngestQueueUrl:
    Description: "URL da fila de ingestão"
    Value: !Ref IngestQueue
  IngestDLQUrl:
    Description: "URL da DLQ da ingestão"
    Value: !Ref IngestDLQ
